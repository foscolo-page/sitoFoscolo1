<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Gioco Foscolo</title>
<style>
body{
#puzzle button{
  min-width:260px;
  padding:18px 22px;

  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);

  border-radius:16px;

  color:white;
  font-size:18px;
  font-weight:500;

  margin:10px;

  cursor:pointer;

  transition: all 0.3s ease;
  position: relative;
  overflow:hidden;
}
.progress{
  width:100%;
  height:12px;
  background:#1e293b;
  border-radius:20px;
  margin-bottom:25px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background: linear-gradient(90deg,#22c55e,#4ade80);
  transition:0.4s ease;
  box-shadow: 0 0 12px rgba(34,197,94,0.7);
}

/* hover bello */
#puzzle button:hover{
  transform: translateY(-5px) scale(1.03);
  background: rgba(99,102,241,0.25);
  border-color: rgba(99,102,241,0.6);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* click effetto */
#puzzle button:active{
  transform: scale(0.97);
}

/* luce che scorre */
#puzzle button::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:100%;
  height:100%;
  background: linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:0.5s;
}

#puzzle button:hover::before{
  left:120%;
}

/* selezionato (aggiungiamo classe via JS dopo) */
.selected{
  background: rgba(34,197,94,0.25) !important;
  border-color: #22c55e !important;
  box-shadow: 0 0 20px rgba(34,197,94,0.4);
}
.home-btn{
  position: fixed;
  top: 15px;
  left: 15px;

  width: 45px;
  height: 45px;

  background: #6366f1;
  border-radius: 12px;

  display: flex;
  justify-content: center;
  align-items: center;

  text-decoration: none;

  transition: 0.3s;
  z-index: 999;
}

.home-btn:hover{
  transform: scale(1.1);
  background: #4f46e5;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* ICONA */
.home-icon{
  width: 22px;
  height: 22px;
  fill: white;
}
  font-family: Montserrat, sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
  padding:40px;
  margin:0;

  opacity:0;
  animation: pageIn 0.8s ease forwards;
}

@keyframes pageIn{
  to{opacity:1;}
}

/* TITOLI */
h2{
  animation: fadeDown 0.8s ease forwards;
  opacity:0;
  transform: translateY(-20px);
}

@keyframes fadeDown{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* BOTTONI GENERALI */
button{
  padding:14px 20px;
  margin:8px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
  cursor:pointer;

  transition: all 0.25s ease;
}

button:hover{
  transform:scale(1.06);
  background:#16a34a;
}

button:active{
  transform:scale(0.95);
}

/* PUZZLE BOX */
#puzzle button{
  min-width:220px;
  display:inline-block;
  animation: popIn 0.4s ease forwards;
}

@keyframes popIn{
  from{
    opacity:0;
    transform:scale(0.8);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

/* QUIZ BOX ANIMAZIONE */
#quizBox{
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* RISULTATI */
#puzzleResult, #quizResult{
  margin-top:20px;
  font-size:18px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* LINK HOME */
.linkgame{
  display:inline-block;
  padding:12px 18px;
  background:#6366f1;
  border-radius:10px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.linkgame:hover{
  transform:scale(1.05);
  background:#4f46e5;
}

</style>
</head>

<section>

<h1>BENVENUTO NEI GIOCHI FOSCOLIANI</h1>
<h2>Buon divertimento!</h2>

<!-- PUZZLE -->
<section>
<p>Ricostruisci la vita di Foscolo</p>
<div id="puzzle"></div>
<p id="puzzleResult"></p>
</section>

<!-- QUIZ -->
<section>
<h1>Quiz finale su Foscolo</h1>
<div id="quizBox"></div>
<p id="quizResult"></p>
</section>

<script>

/* ================= PUZZLE ================= */

const stepsOrdine = [
  "Zante",
  "Trasferimento a Venezia",
  "Studi e formazione culturale",
  "Ideali rivoluzionari",
  "Trattato di Campoformio",
  "Delusione verso Napoleone",
  "Scrittura dell'Ortis",
  "Attività militare",
  "Esilio dalla patria",
  "Permanenza in Svizzera",
  "Trasferimento in Inghilterra",
  "Attività letteraria finale",
  "Morte a Londra (1827)"
];
let selected = [];

function renderPuzzle(){
    const puzzleDiv = document.getElementById('puzzle');

    let shuffled = [...stepsOrdine];
    for(let i = shuffled.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    puzzleDiv.innerHTML = '';

    shuffled.forEach(step => {
        const btn = document.createElement('button');
        btn.innerText = step;

        // 👇 PASSO IL BOTTONE STESSO
        btn.onclick = () => selectStep(step, btn);

        puzzleDiv.appendChild(btn);
    });
}

function selectStep(step, btn){

    if(selected.includes(step)){
        selected = selected.filter(s => s !== step);
        btn.classList.remove("selected");
    } else {
        selected.push(step);
        btn.classList.add("selected");
    }

    const resultDiv = document.getElementById('puzzleResult');

    resultDiv.innerHTML =
    `Hai scelto ${selected.length}/${stepsOrdine.length}<br>
    ${selected.join(' → ')}`;

    // ✅ CONTROLLO FINALE
    if(selected.length === stepsOrdine.length){

        let correct = true;

        for(let i = 0; i < stepsOrdine.length; i++){
            if(selected[i] !== stepsOrdine[i]){
                correct = false;
                break;
            }
        }

        if(correct){
            resultDiv.innerHTML = "✅ Ordine corretto!";
            resultDiv.style.color = "#22c55e";

            // reset dopo poco
            setTimeout(() => {
                selected = [];
                renderPuzzle();
                resultDiv.innerHTML = "";
            }, 8000);

        } else {
            resultDiv.innerHTML = "❌ Ordine sbagliato!";
            resultDiv.style.color = "#ef4444";

            // ❌ RESET SUBITO (quello che vuoi)
            setTimeout(() => {
                selected = [];
                renderPuzzle();
                resultDiv.innerHTML = "";
            },  1900);
        }
    }
}

// inizializza puzzle alla prima esecuzione
renderPuzzle();
</script>
<br>
</br>

<script>
const quiz = [
{
domanda:"Di che genere è Le ultime lettere di Jacopo Ortis?",
risposte:["A) Romanzo storico","B) Romanzo epistolare","C) Poema epico","D) Commedia"],
corretta:"B) Romanzo epistolare"
},
{
domanda:"Perché Jacopo Ortis si suicida?",
risposte:["A) Solo per amore","B) Solo per motivi economici","C) Per persecuzione politica e amore impossibile","D) Per un duello"],
corretta:"C) Per persecuzione politica e amore impossibile"
},
{
domanda:"Chi raccoglie e pubblica le lettere di Jacopo dopo la sua morte?",
risposte:["A) Teresa","B) Odoardo","C) Lorenzo Alderani","D) Parini"],
corretta:"C) Lorenzo Alderani"
},
{
domanda:"Quale evento storico segna il crollo degli ideali di Jacopo?",
risposte:["A) La morte di Napoleone","B) Il trattato di Campoformio (1797)","C) La Rivoluzione francese","D) La caduta dell’Impero romano"],
corretta:"B) Il trattato di Campoformio (1797)"
},
{
domanda:"Jacopo Ortis è definito un tipico:",
risposte:["A) Eroe classico","B) Eroe romantico","C) Antieroe","D) Filosofo stoico"],
corretta:"B) Eroe romantico"
},

{
domanda:"In che anno fu composto Dei Sepolcri?",
risposte:["A) 1797","B) 1802","C) 1807","D) 1816"],
corretta:"C) 1807"
},
{
domanda:"A quale editto napoleonico risponde il carme?",
risposte:["A) Editto di Fontainebleau","B) Editto di Saint-Cloud","C) Codice civile","D) Editto di Milano"],
corretta:"B) Editto di Saint-Cloud"
},
{
domanda:"Secondo Foscolo, a chi servono realmente le tombe?",
risposte:["A) Ai morti","B) Ai vivi","C) Alla Chiesa","D) Allo Stato"],
corretta:"B) Ai vivi"
},
{
domanda:"Quale luogo diventa simbolo della memoria nazionale nel carme?",
risposte:["A) Il Colosseo","B) Santa Croce a Firenze","C) San Pietro a Roma","D) Il Duomo di Milano"],
corretta:"B) Santa Croce a Firenze"
},
{
domanda:"Quale di questi personaggi NON viene citato?",
risposte:["A) Machiavelli","B) Michelangelo","C) Galileo","D) Dante Alighieri"],
corretta:"D) Dante Alighieri"
},

{
domanda:"A cosa paragona Foscolo il proprio esilio?",
risposte:["A) Dante","B) Ulisse","C) Enea","D) Ovidio"],
corretta:"B) Ulisse"
},
{
domanda:"Quale divinità nacque a Zante?",
risposte:["A) Atena","B) Venere","C) Giunone","D) Diana"],
corretta:"B) Venere"
},
{
domanda:"Cosa poté fare Ulisse che Foscolo no?",
risposte:["A) Scrivere","B) Rivedere la patria","C) Combattere","D) Morire in mare"],
corretta:"B) Rivedere la patria"
},
{
domanda:"Qual è la consolazione di Foscolo?",
risposte:["A) Ricchezza","B) Amore","C) Versi che cantano Zante","D) Gloria"],
corretta:"C) Versi che cantano Zante"
},
{
domanda:"Incipit del sonetto?",
risposte:["A) Forse perché","B) Né più mai toccherò","C) Un dì","D) Alla sera"],
corretta:"B) Né più mai toccherò"
},

{
domanda:"A cosa è paragonata la sera?",
risposte:["A) Primavera","B) Amore","C) Morte","D) Gloria"],
corretta:"C) Morte"
},
{
domanda:"Cosa placa la notte?",
risposte:["A) Fame","B) Giustizia","C) Tempeste interiori","D) Guerra"],
corretta:"C) Tempeste interiori"
},
{
domanda:"Il nulla eterno è visto come:",
risposte:["A) Condanna","B) Preferibile","C) Punizione","D) Illusione"],
corretta:"B) Preferibile"
},
{
domanda:"Cosa dorme nel finale?",
risposte:["A) Amore","B) Speranza","C) Spirto guerrier","D) Ragione"],
corretta:"C) Spirto guerrier"
},
{
domanda:"Verso finale?",
risposte:["A) O materna terra","B) Spirto guerrier","C) Guardo la tua pace","D) Canto del figlio"],
corretta:"C) Guardo la tua pace"
},

{
domanda:"Le Grazie è un’opera:",
risposte:["A) Completa","B) Incompiuta","C) Teatrale","D) Epica"],
corretta:"B) Incompiuta"
},
{
domanda:"Chi sono le Grazie?",
risposte:["A) Muse","B) Tre Grazie","C) Parche","D) Ore"],
corretta:"B) Tre Grazie"
},
{
domanda:"Cosa rappresenta la bellezza?",
risposte:["A) Ornamento","B) Forza civile","C) Illusione","D) Religione"],
corretta:"B) Forza civile"
},
{
domanda:"A quale mondo si ispira?",
risposte:["A) Medioevo","B) Rinascimento","C) Grecia","D) Illuminismo"],
corretta:"C) Grecia"
},
{
domanda:"Qual è l’ideale finale?",
risposte:["A) Guerra","B) Bellezza e arte","C) Ragione","D) Esilio"],
corretta:"B) Bellezza e arte"
}
];

function renderQuiz(){
  const box = document.getElementById("quizBox");

  box.innerHTML = quiz.map((q, i) => `
    <div class="question">
      <p><strong>${i+1}. ${q.domanda}</strong></p>
      ${q.risposte.map(r => `
        <label>
          <input type="radio" name="q${i}" value="${r}">
          ${r}
        </label><br>
      `).join("")}
      <p id="f${i}"></p>
      <hr>
    </div>
  `).join("");

  box.innerHTML += `<button onclick="correggi()">Invia</button>`;
}

function correggi(){
  let score = 0;

  quiz.forEach((q,i)=>{
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    const f = document.getElementById(`f${i}`);

    if(sel){
      if(sel.value === q.corretta){
        score++;
        f.innerHTML = "Giusto";
        f.style.color = "#22c55e";
      }else{
        f.innerHTML = "Sbagliato (corretta: " + q.corretta + ")";
        f.style.color = "#ef4444";
      }
    }else{
      f.innerHTML = "Non risposto";
      f.style.color = "orange";
    }
  });

  document.getElementById("quizResult").innerHTML =
    `Punteggio: ${score}/${quiz.length}`;
}

renderQuiz();
</script>
